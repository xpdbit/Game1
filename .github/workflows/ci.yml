name: CI (Pull Request)

on:
  pull_request:
    branches: [main]

env:
  UNITY_VERSION: '6000.1.5f1'

jobs:
  # ============================================
  # Windows Standalone Build
  # ============================================
  build-windows:
    name: Build Windows Standalone
    runs-on: ubuntu-latest
    container:
      image: registry.hub.docker.com/gerardmorchilony/unity-ci-ubuntu-with-mutiplayer:v2.0
    outputs:
      build-result: ${{ steps.build.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create LFS file list
        run: |
          if [ -f .gitattributes ]; then
            grep "filter=lfs" .gitattributes | sed 's/filter=lfs//' | sed 's/^ *//' | sed 's/ *$//' > lfs_files.txt
          fi

      - name: Download LFS objects
        if: env.lfs_files
        run: |
          if [ -f lfs_files.txt ]; then
            git lfs pull --include "$(cat lfs_files.txt | tr '\n' ',')"
          fi

      - name: Build Windows Standalone
        id: build
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          /opt/unity-editor/Editor/Unity \
            -projectPath "${{ github.workspace }}" \
            -buildWindows64Player "Build/Windows/${{ github.sha }}/Game1.exe" \
            -logFile build.log \
            -quit
          echo "result=$?" >> $GITHUB_OUTPUT

      - name: Upload Windows Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build-${{ github.sha }}
          path: Build/Windows/${{ github.sha }}/
          retention-days: 90

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build-Log-${{ github.sha }}
          path: build.log
          retention-days: 90

  # ============================================
  # WebGL Build
  # ============================================
  build-webgl:
    name: Build WebGL
    runs-on: ubuntu-latest
    container:
      image: registry.hub.docker.com/gerardmorchilony/unity-ci-ubuntu-with-mutiplayer:v2.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WebGL
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          /opt/unity-editor/Editor/Unity \
            -projectPath "${{ github.workspace }}" \
            -buildWebGLPlayer "Build/WebGL/${{ github.sha }}" \
            -logFile webgl-build.log \
            -quit

      - name: Upload WebGL Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WebGL-Build-${{ github.sha }}
          path: Build/WebGL/${{ github.sha }}/
          retention-days: 90

      - name: Upload WebGL Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WebGL-Build-Log-${{ github.sha }}
          path: webgl-build.log
          retention-days: 90

  # ============================================
  # Unit Tests
  # ============================================
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    container:
      image: registry.hub.docker.com/gerardmorchilony/unity-ci-ubuntu-with-mutiplayer:v2.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Unit Tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          /opt/unity-editor/Editor/Unity \
            -projectPath "${{ github.workspace }}" \
            -runTests \
            -testPlatform EditMode \
            -testResults "${{ github.workspace }}/test-results/editmode.xml" \
            -logFile test.log \
            -quit

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Results-EditMode-${{ github.sha }}
          path: test-results/
          retention-days: 90

      - name: Upload Test Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Log-${{ github.sha }}
          path: test.log
          retention-days: 90

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: EditMode Tests
          path: 'test-results/*.xml'
          reporter: dotnet-trx
          fail-on: test failures

  # ============================================
  # Code Quality Check
  # ============================================
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore Game1.sln

      - name: Run Static Analysis
        run: |
          # 运行分析器并输出结果
          dotnet build Game1.sln --no-restore -p:EnableNETAnalyzers=true > analysis.log 2>&1 || true
          cat analysis.log
          echo "---ANALYSIS-EXIT-CODE---"
          # 检查是否有 Critical 或 High 级别警告
          if grep -E "^(error|warning) CS(1061|1062|1063|1500|1502|1505|1506|1802|1805|1812|1813|1822|1823|2007|2008|2009)" analysis.log 2>/dev/null; then
            echo "FOUND_CRITICAL_HIGH_WARNINGS"
            exit 1
          fi
          echo "NO_CRITICAL_HIGH_WARNINGS"

      - name: Check EditorConfig Compliance
        run: |
          # 使用 .NET SDK 的格式检查
          dotnet format Game1.sln --verify-no-changes --report > format-report.txt 2>&1 || true
          cat format-report.txt
          echo "---FORMAT-EXIT-CODE---"
          if grep -q "error" format-report.txt 2>/dev/null; then
            echo "FORMAT_ERRORS_FOUND"
            exit 1
          fi
          echo "FORMAT_OK"

      - name: Upload Analysis Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Code-Quality-Report-${{ github.sha }}
          path: |
            analysis.log
            format-report.txt
          retention-days: 30

  # ============================================
  # CI Status Report
  # ============================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [build-windows, build-webgl, test, code-quality]
    if: always()
    steps:
      - name: CI Summary
        run: |
          echo "## CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows Build | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebGL Build | ${{ needs.build-webgl.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Send Notification on Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          author_name: 'Game1 CI'
          fields: repo,message,commit,author,workflow,job
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
